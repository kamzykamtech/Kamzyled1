<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMTECH | Card Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="screen-splash" class="screen">
            <div class="floating-name">Aishat</div>
            <h1 class="kamtech-logo">KAMTECH</h1>
            <button class="btn-primary" onclick="showScreen('screen-warning')">START GAME</button>
        </div>

        <div id="screen-warning" class="screen" style="display:none;">
            <h2 class="neon-text">18+ WARNING</h2>
            <div class="warning-box">
                <p>This game contains adult content.</p>
                <p>Rules: Pick a card to reveal a question or dare.</p>
            </div>
            <button class="btn-primary" onclick="showScreen('screen-lobby')">I AGREE</button>
        </div>

        <div id="screen-lobby" class="screen" style="display:none;">
            <div class="lobby-container">
                <button class="btn-secondary" id="btn-create">CREATE GAME</button>
                <div class="divider">OR</div>
                <input type="text" id="join-input" placeholder="6-Digit Code">
                <button class="btn-secondary" id="btn-join">JOIN GAME</button>
            </div>
            <p id="room-display" class="neon-text"></p>
        </div>

        <div id="screen-modes" class="screen" style="display:none;">
            <h3>CHOOSE MODE</h3>
            <button class="btn-mode" onclick="setMode(1)">Mode 1: Card Roulette</button>
            <button class="btn-mode" onclick="setMode(2)">Mode 2: Shuffled Deal</button>
            <button class="btn-mode" onclick="setMode(3)">Mode 3: Free Pick</button>
        </div>

        <div id="screen-game" class="screen" style="display:none;">
            <div id="card-container" class="card-grid"></div>
            <div id="question-display" class="modal" style="display:none;">
                <div class="modal-content">
                    <p id="question-text"></p>
                    <button class="btn-primary" onclick="closeQuestion()">NEXT</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
